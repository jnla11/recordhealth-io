<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADI Console — Record Health</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #0a0e17; --surface: #111827; --surface-hover: #1a2236;
    --border: #1e293b; --border-active: #3b82f6;
    --text: #e2e8f0; --text-muted: #64748b; --text-dim: #475569;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --green: #10b981; --green-bg: #10b98118;
    --amber: #f59e0b; --amber-bg: #f59e0b18;
    --red: #ef4444; --red-bg: #ef444418;
    --purple: #8b5cf6; --purple-bg: #8b5cf618;
    --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
    --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }

  /* Auth */
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .auth-box { width: 420px; padding: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  .auth-label { font-size: 11px; font-family: var(--font-mono); color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }
  .auth-title { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .auth-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
  .field-label { display: block; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .field-group { margin-bottom: 16px; }
  .auth-input { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 13px; outline: none; }
  .auth-input:focus { border-color: var(--accent); }
  .error-msg { font-size: 12px; color: var(--red); margin-top: 6px; }

  /* Buttons */
  .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-family: var(--font-mono); font-weight: 500; cursor: pointer; border: 1px solid; transition: all 0.15s ease; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-ghost { background: transparent; border-color: var(--border); color: var(--text); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface-hover); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-xs { padding: 5px 12px; font-size: 11px; }
  .btn-full { width: 100%; padding: 10px 16px; margin-top: 12px; }
  .btn-green { background: var(--green); border-color: var(--green); color: #fff; }
  .btn-red { background: var(--red); border-color: var(--red); color: #fff; }
  .btn-amber { background: var(--amber); border-color: var(--amber); color: #000; }

  /* Badge */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); font-weight: 500; letter-spacing: 0.02em; }
  .badge-blue { background: #3b82f618; color: #60a5fa; border: 1px solid #3b82f640; }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid #10b98140; }
  .badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid #f59e0b40; }
  .badge-red { background: var(--red-bg); color: var(--red); border: 1px solid #ef444440; }
  .badge-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid #8b5cf640; }
  .badge-gray { background: #64748b18; color: #94a3b8; border: 1px solid #64748b40; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 48px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-brand { font-size: 14px; font-weight: 700; font-family: var(--font-mono); }
  .header-version { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }
  .nav-btn { padding: 5px 12px; border-radius: 5px; border: none; background: transparent; color: var(--text-muted); font-size: 12px; font-family: var(--font-sans); font-weight: 500; cursor: pointer; }
  .nav-btn.active { background: var(--bg); color: var(--text); }

  /* Layout */
  .content { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .loading { color: var(--text-muted); padding: 40px; }

  /* Stat cards */
  .stat-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; flex: 1; min-width: 140px; }
  .stat-label { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-family: var(--font-mono); font-weight: 600; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* Queue */
  .queue-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .section-sub { font-size: 12px; color: var(--text-muted); }
  .filter-row { display: flex; gap: 6px; }
  .queue-col-header { display: grid; grid-template-columns: 1fr 110px 130px 100px 90px 120px; gap: 10px; padding: 6px 14px; font-size: 9px; font-family: var(--font-mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .queue-row { display: grid; grid-template-columns: 1fr 110px 130px 100px 90px 120px; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 12px; font-family: var(--font-mono); align-items: center; margin-bottom: 2px; }
  .queue-row:hover { background: var(--surface-hover); border-color: var(--border-active); }
  .queue-empty { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 40px; text-align: center; color: var(--text-dim); font-size: 13px; }

  /* Audit queue rows — different column layout */
  .audit-col-header { display: grid; grid-template-columns: 160px 1fr 80px 90px; gap: 10px; padding: 6px 14px; font-size: 9px; font-family: var(--font-mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .audit-row { display: grid; grid-template-columns: 160px 1fr 80px 90px; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 12px; font-family: var(--font-mono); align-items: center; margin-bottom: 2px; }
  .audit-row:hover { background: var(--surface-hover); border-color: var(--border-active); }
  .audit-doc-col-header { display: grid; grid-template-columns: 1fr 110px 60px 50px 50px 50px; gap: 10px; padding: 6px 14px; font-size: 9px; font-family: var(--font-mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .audit-doc-row { display: grid; grid-template-columns: 1fr 110px 60px 50px 50px 50px; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 12px; font-family: var(--font-mono); align-items: center; margin-bottom: 2px; }
  .audit-doc-row:hover { background: var(--surface-hover); border-color: var(--border-active); }

  /* Audit page buttons */
  .page-selector { display: flex; flex-wrap: wrap; gap: 4px; margin: 12px 0 16px; }

  /* Audit JSON blocks */
  .json-block { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; color: var(--text); white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; margin-bottom: 12px; }
  .json-section-label { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 6px; }

  /* ─── ANNOTATION WORKSPACE ─── */
  .workspace { display: flex; gap: 0; height: calc(100vh - 48px); overflow: hidden; }
  .pdf-pane { flex: 3; background: #1a1a2e; overflow: auto; position: relative; border-right: 1px solid var(--border); }
  .pdf-pane canvas { display: block; margin: 0 auto; }
  .annotation-pane { flex: 2; min-width: 380px; max-width: 480px; overflow-y: auto; background: var(--bg); padding: 16px; }

  /* PDF overlay */
  .pdf-container { position: relative; display: inline-block; margin: 20px auto; }
  .pdf-container canvas { display: block; }
  .overlay-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .overlay-svg .region { pointer-events: all; cursor: pointer; transition: all 0.15s; }
  .overlay-svg .region:hover { stroke-width: 2.5; }
  .overlay-svg .region-extraction { fill: rgba(59,130,246,0.12); stroke: rgba(59,130,246,0.6); stroke-width: 1.5; }
  .overlay-svg .region-extraction.selected { fill: rgba(59,130,246,0.25); stroke: rgba(59,130,246,1); stroke-width: 2.5; }
  .overlay-svg .region-confirmed { fill: rgba(16,185,129,0.12); stroke: rgba(16,185,129,0.6); stroke-width: 1.5; }
  .overlay-svg .region-corrected { fill: rgba(245,158,11,0.12); stroke: rgba(245,158,11,0.6); stroke-width: 1.5; }
  .overlay-svg .region-rejected { fill: rgba(239,68,68,0.12); stroke: rgba(239,68,68,0.6); stroke-width: 1.5; }
  .overlay-svg .region-discovery { fill: rgba(139,92,246,0.15); stroke: rgba(139,92,246,0.8); stroke-width: 2; stroke-dasharray: 4,3; }
  .overlay-svg .region-drawing { fill: rgba(139,92,246,0.1); stroke: rgba(139,92,246,0.5); stroke-width: 1; stroke-dasharray: 3,3; }
  .overlay-svg .region-phi { fill: rgba(239,68,68,0.12); stroke: rgba(239,68,68,0.6); stroke-width: 1.5; }

  /* Annotation panel sections */
  .ann-panel-header { padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .ann-panel-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .ann-panel-sub { font-size: 11px; color: var(--text-muted); }
  .tool-bar { display: flex; gap: 6px; margin-bottom: 12px; padding: 8px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); }
  .tool-btn { padding: 6px 12px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); }
  .tool-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Selected extraction detail */
  .ext-detail { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 10px; }
  .ext-detail-field { font-family: var(--font-mono); font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .ext-detail-value { font-family: var(--font-mono); font-size: 12px; color: var(--green); margin-bottom: 8px; }
  .ext-detail-meta { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); margin-bottom: 8px; }
  .verdict-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .verdict-btn { padding: 5px 14px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); }
  .verdict-btn:hover { border-color: var(--text-muted); }
  .verdict-btn.v-confirmed { background: var(--green-bg); color: var(--green); border-color: #10b98140; }
  .verdict-btn.v-corrected { background: var(--amber-bg); color: var(--amber); border-color: #f59e0b40; }
  .verdict-btn.v-rejected { background: var(--red-bg); color: var(--red); border-color: #ef444440; }
  .ann-input { width: 100%; padding: 6px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 11px; outline: none; margin-bottom: 6px; }
  .ann-input:focus { border-color: var(--accent); }
  .ann-textarea { width: 100%; padding: 6px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 11px; outline: none; resize: vertical; min-height: 40px; margin-bottom: 6px; }
  .ann-select { width: 100%; padding: 6px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 11px; outline: none; margin-bottom: 6px; }

  /* Annotation list in panel */
  .ann-list-item { padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; margin-bottom: 6px; font-size: 11px; }
  .ann-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }

  /* Session bar */
  .session-bar { position: fixed; bottom: 0; right: 0; width: 480px; padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
  .session-stats { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); }
  .info-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; color: var(--text-dim); font-size: 13px; }

  /* Page nav */
  .page-nav { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .page-nav span { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); }

  /* ─── AP-10c — Audit Split Pane ─── */
  .adi-split { display: flex; height: calc(100vh - 48px); overflow: hidden; }
  .adi-pdf-pane { flex: 0 0 60%; background: #1a1a2e; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
  .adi-right-pane { flex: 1; background: var(--bg); display: flex; flex-direction: column; min-width: 0; }
  .adi-pdf-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; }
  .adi-pdf-topbar .doc-title { font-size: 12px; font-family: var(--font-mono); color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 30%; min-width: 0; }
  .adi-page-nav { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); flex-shrink: 0; }
  .adi-zoom { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); flex-shrink: 0; }
  .adi-zoom-btn { width: 24px; height: 24px; border-radius: 4px; background: transparent; border: 1px solid var(--border); color: var(--text); cursor: pointer; font-family: var(--font-mono); font-size: 14px; line-height: 1; padding: 0; }
  .adi-zoom-btn:hover:not(:disabled) { background: var(--surface-hover); }
  .adi-zoom-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .adi-canvas-area { flex: 1; overflow: auto; padding: 20px; touch-action: none; }
  .adi-canvas-area .pdf-container { margin: 0 auto; }
  .adi-empty-prompt { color: var(--text-dim); font-family: var(--font-mono); font-size: 12px; text-align: center; padding: 60px 20px; }

  .adi-right-topbar { display: flex; align-items: center; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .adi-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .adi-tab-btn { flex: 1; padding: 10px 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; font-weight: 500; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; }
  .adi-tab-btn:hover { color: var(--text); }
  .adi-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg); }
  .adi-tab-content { flex: 1; overflow-y: auto; padding: 16px; }

  /* Session detail cards */
  .adi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .adi-card-title { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .adi-kv { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; font-family: var(--font-mono); }
  .adi-kv .k { color: var(--text-muted); }
  .adi-kv .v { color: var(--text); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }

  /* Fields & PHI list */
  .adi-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 0 4px; }
  .adi-list-title { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .adi-filter-row { display: flex; align-items: center; gap: 6px; padding: 8px 4px 12px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .adi-filter-label { font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .adi-filter-select { padding: 5px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 11px; outline: none; }
  .adi-field-row { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; margin-bottom: 4px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; }
  .adi-field-row:hover { background: var(--surface-hover); border-color: var(--border-active); }
  .adi-field-row.selected { background: var(--surface-hover); border-color: var(--accent); }
  .adi-field-row .type-badge { padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0; }
  .adi-field-row .type-badge.clinical { background: #3b82f626; color: #60a5fa; border: 1px solid #3b82f640; }
  .adi-field-row .type-badge.temporal { background: #8b5cf626; color: #a78bfa; border: 1px solid #8b5cf640; }
  .adi-field-row .type-badge.provider { background: #f59e0b26; color: #fbbf24; border: 1px solid #f59e0b40; }
  .adi-field-row .kind { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .adi-field-row .conf { color: var(--text-muted); font-size: 10px; flex-shrink: 0; }
  .adi-field-row .tier { padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 600; flex-shrink: 0; }
  .adi-field-row .tier.t1 { background: var(--green-bg); color: var(--green); border: 1px solid #10b98140; }
  .adi-field-row .tier.t2 { background: var(--amber-bg); color: var(--amber); border: 1px solid #f59e0b40; }
  .adi-field-row .tier.t3 { background: var(--red-bg); color: var(--red); border: 1px solid #ef444440; }
  .adi-phi-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .adi-phi-placeholder { color: var(--text-muted); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; max-width: 40%; }

  /* Detail view */
  .adi-back { padding: 6px 12px; border-radius: 5px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; cursor: pointer; margin-bottom: 14px; }
  .adi-back:hover { color: var(--text); border-color: var(--text-muted); }
  .adi-title { font-size: 15px; font-weight: 600; font-family: var(--font-mono); color: var(--text); margin-bottom: 14px; word-break: break-all; }
  .adi-title.muted { color: var(--text-muted); font-style: italic; font-weight: 500; margin-bottom: 2px; }
  .adi-subtitle { font-size: 18px; font-weight: 600; font-family: var(--font-mono); color: var(--accent); margin: 0 0 14px; word-break: break-all; line-height: 1.3; }
  .adi-note { padding: 10px 12px; background: var(--amber-bg); border: 1px solid #f59e0b40; border-radius: 6px; color: var(--amber); font-size: 11px; font-family: var(--font-mono); margin-bottom: 14px; line-height: 1.55; }
  .adi-placeholder { padding: 14px 16px; background: var(--surface); border: 1px dashed var(--border); border-radius: 6px; color: var(--text-dim); font-size: 11px; font-family: var(--font-mono); text-align: center; }

  /* Overlay boxes */
  .adi-overlay rect { transition: opacity 0.12s ease; pointer-events: all; cursor: pointer; }
  .adi-overlay .box-field { fill: rgba(59,130,246,0.12); stroke: rgba(59,130,246,0.65); stroke-width: 1.5; }
  .adi-overlay .box-field.dim { fill: rgba(59,130,246,0.025); stroke: rgba(59,130,246,0.2); }
  .adi-overlay .box-field.sel { fill: rgba(59,130,246,0.3); stroke: #60a5fa; stroke-width: 2.5; }
  .adi-overlay .box-field-val { fill: rgba(59,130,246,0.22); stroke: rgba(59,130,246,0.95); stroke-width: 1; }
  .adi-overlay .box-field-val.dim { fill: rgba(59,130,246,0.05); stroke: rgba(59,130,246,0.25); }
  .adi-overlay .box-field-val.sel { fill: rgba(59,130,246,0.45); stroke: #93c5fd; stroke-width: 1.5; }
  .adi-overlay .box-phi { fill: rgba(239,68,68,0.12); stroke: rgba(239,68,68,0.7); stroke-width: 1.5; }
  .adi-overlay .box-phi.dim { fill: rgba(239,68,68,0.025); stroke: rgba(239,68,68,0.22); }
  .adi-overlay .box-phi.sel { fill: rgba(239,68,68,0.32); stroke: #fca5a5; stroke-width: 2.5; }
</style>
</head>
<body>
<div id="app"></div>
<script src="config.js"></script>
<script>
const SEED_API_BASE = "https://recordhealth-api.jason-nolte.workers.dev";
const AUDIT_API_BASE = "https://recordhealth-api-staging.jason-nolte.workers.dev";
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

// ─── Confusion Classes ───────────────────────────────────
const CONFUSION_CLASSES = [
  { group: "Domain 1 — Optical", classes: ["d1_alphanumericSubstitution","d1_ligatureCollapse","d1_punctuationDropout","d1_diacriticStrip","d1_lowContrastDropout","d1_skewDistortion","d1_motionBlur","d1_shadowIntrusion","d1_compressionArtifact","d1_faxHalftone","d1_generationLoss","d1_stampOverlay","d1_paperDamage","d1_backgroundTexture"] },
  { group: "Domain 2 — Layout", classes: ["d2_columnMisattribution","d2_referenceRangeCollision","d2_labelValueInversion","d2_headerValueCollision","d2_multiPageContextLoss","d2_sectionBoundaryFailure","d2_nestedTableFailure","d2_reflowArtifact","d2_impliedUnitContext","d2_lineBreakIntrusion","d2_whitespaceDelimiterAmbiguity"] },
  { group: "Domain 2 — Terminology", classes: ["d2_terminologyVariant","d2_brandToGenericFailure","d2_formularyCodeUnresolved","d2_compoundTermFailure","d2_unitVariant","d2_numericFormatVariant","d2_dateFormatVariant","d2_negationMisparse","d2_qualifierDropout","d2_contextualAbbreviationCollision","d2_providerSpecificNomenclature"] },
  { group: "Other", classes: ["unknown"] }
];

// ─── State ───────────────────────────────────────────────
let state = {
  apiKey: localStorage.getItem("seed_api_key") || null,
  auditKey: sessionStorage.getItem("audit_admin_key") || null,
  view: "dashboard",
  selectedDoc: null,
  loading: false,
  error: null,
  stats: null,
  queue: null,
  filter: "all",
  // Workspace state
  docDetail: null,
  pdfDoc: null,
  currentPage: 1,
  totalPages: 0,
  canvasWidth: 0,
  canvasHeight: 0,
  // Annotation state
  tool: "select",
  sessionId: null,
  selectedExtraction: null,
  annotations: [],
  drawStart: null,
  drawCurrent: null,
  connectSource: null,
  // Audit state
  auditView: "sessions",
  auditSessions: null,
  selectedAuditSession: null,
  selectedAuditDoc: null,
  auditDocDetail: null,
  auditPageData: null,
  auditPageIndex: null,
  auditSessionDetail: null,
  auditLoading: false,
  // Audit PDF viewer state (AP-9)
  auditPdfDoc: null,
  auditCurrentPage: 1,
  auditCanvasWidth: 0,
  auditCanvasHeight: 0,
  // AP-10c — audit split pane
  auditTab: "detail",              // "detail" | "fields" | "phi"
  auditFieldFilter: "all",         // "all" | "clinical" | "temporal" | "provider"
  auditFieldView: "list",          // "list" | "detail"
  auditPhiView: "list",            // "list" | "detail"
  auditSelectedField: null,        // index into filtered list
  auditSelectedPhi: null,          // index into deduped list
  auditPhiBoxes: null,             // from /phi-boxes/:n
  auditPdfScale: 1.0,              // 0.5–3.0
  auditRenderTask: null,           // pdf.js RenderTask
};

function setState(updates) { Object.assign(state, updates); render(); }

// ─── Seed API ────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(`${SEED_API_BASE}${path}`, {
    method: opts.method || (opts.body ? "POST" : "GET"),
    headers: { "Authorization": `Bearer ${state.apiKey}`, "Content-Type": "application/json" },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ─── Audit API ───────────────────────────────────────────
async function auditApi(path) {
  const key = state.auditKey;
  if (!key) throw new Error("No audit admin key");
  const res = await fetch(`${AUDIT_API_BASE}${path}`, {
    headers: { "Authorization": `Bearer ${key}` }
  });
  if (!res.ok) {
    if (res.status === 401 || res.status === 403) {
      sessionStorage.removeItem("audit_admin_key");
      state.auditKey = null;
      throw new Error("Audit auth failed — key cleared. Re-enter key.");
    }
    throw new Error(`Audit API: ${res.status} ${res.statusText}`);
  }
  return res.json();
}

function uuid() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); }); }

// ─── Auth ────────────────────────────────────────────────
async function doAuth(seedKey, auditKey) {
  try {
    state.apiKey = seedKey;
    state.auditKey = auditKey;
    await api("/v1/seed/queue?limit=1");
    localStorage.setItem("seed_api_key", seedKey);
    sessionStorage.setItem("audit_admin_key", auditKey);
    setState({ error: null });
    loadDashboard();
  } catch (e) {
    state.apiKey = null;
    localStorage.removeItem("seed_api_key");
    setState({ error: e.message });
  }
}

function disconnect() {
  localStorage.removeItem("seed_api_key");
  sessionStorage.removeItem("audit_admin_key");
  setState({ apiKey: null, auditKey: null, view: "dashboard", selectedDoc: null });
}

// ─── Seed Actions ────────────────────────────────────────
async function loadDashboard() { setState({ loading: true }); try { setState({ stats: await api("/v1/seed/stats"), loading: false }); } catch (e) { setState({ loading: false }); } }

async function loadQueue() { setState({ loading: true }); try { const p = state.filter !== "all" ? `?status=${state.filter}` : ""; setState({ queue: await api(`/v1/seed/queue${p}`), loading: false }); } catch (e) { setState({ loading: false }); } }

async function openDocument(id) {
  setState({ selectedDoc: id, loading: true, view: "workspace", docDetail: null, annotations: [], sessionId: null, selectedExtraction: null, tool: "select", currentPage: 1 });
  try {
    const docDetail = await api(`/v1/seed/document/${id}`);
    const sessionId = uuid();
    await api("/v1/seed/session/start", { method: "POST", body: { id: sessionId, documentId: id, annotatorId: "seed-console" } });
    setState({ docDetail, sessionId, loading: false });
    setTimeout(() => renderPDF(), 50);
  } catch (e) {
    setState({ loading: false, error: e.message });
  }
}

async function renderPDF() {
  const doc = state.docDetail?.document;
  if (!doc?.render_data) return;
  try {
    const pdfData = atob(doc.render_data);
    const pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
    state.pdfDoc = pdfDoc;
    state.totalPages = pdfDoc.numPages;
    renderPage(state.currentPage);
  } catch (e) { console.error("PDF render error:", e); }
}

async function renderPage(pageNum) {
  const pdfDoc = state.pdfDoc;
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(pageNum);
  const scale = 1.5;
  const viewport = page.getViewport({ scale });
  const canvas = document.getElementById("pdf-canvas");
  if (!canvas) return;
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  state.canvasWidth = viewport.width;
  state.canvasHeight = viewport.height;
  const ctx = canvas.getContext("2d");
  await page.render({ canvasContext: ctx, viewport }).promise;
  updateOverlay();
}

function changePage(delta) {
  const newPage = state.currentPage + delta;
  if (newPage >= 1 && newPage <= state.totalPages) {
    state.currentPage = newPage;
    renderPage(newPage);
  }
}

function updateOverlay() {
  const svg = document.getElementById("overlay-svg");
  if (!svg) return;
  svg.setAttribute("viewBox", `0 0 ${state.canvasWidth} ${state.canvasHeight}`);
  let rects = "";
  const extractions = getExtractions();
  extractions.forEach((ext, i) => {
    if (!ext.sourceRegion?.spans) return;
    ext.sourceRegion.spans.forEach(span => {
      if (span.page !== state.currentPage) return;
      const b = span.bounds;
      if (!b) return;
      const x = b.x * state.canvasWidth, y = b.y * state.canvasHeight;
      const w = b.w * state.canvasWidth, h = b.h * state.canvasHeight;
      const ann = state.annotations.find(a => a.interpretationId === (ext.id || `ext-${i}`));
      let cls = "region region-extraction";
      if (ann) cls = `region region-${ann.verdict}`;
      if (state.selectedExtraction === i) cls += " selected";
      rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="${cls}" onclick="selectExtraction(${i})" />`;
    });
  });
  if (extractions.length === 0) {
    const gt = state.docDetail?.document?.ground_truth || [];
    gt.forEach((field, i) => {
      if (!field.approximateBoundingBox) return;
      const b = field.approximateBoundingBox;
      const x = b.x * state.canvasWidth, y = b.y * state.canvasHeight;
      const w = b.w * state.canvasWidth, h = b.h * state.canvasHeight;
      rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="region region-extraction" onclick="selectGTField(${i})" />`;
    });
  }
  state.annotations.filter(a => a.annotationType === "discovery").forEach(a => {
    if (!a.drawnRegion?.spans?.[0]) return;
    const b = a.drawnRegion.spans[0].bounds;
    const x = b.x * state.canvasWidth, y = b.y * state.canvasHeight;
    const w = b.w * state.canvasWidth, h = b.h * state.canvasHeight;
    rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="region region-discovery" />`;
  });
  if (state.drawStart && state.drawCurrent) {
    const x = Math.min(state.drawStart.x, state.drawCurrent.x);
    const y = Math.min(state.drawStart.y, state.drawCurrent.y);
    const w = Math.abs(state.drawCurrent.x - state.drawStart.x);
    const h = Math.abs(state.drawCurrent.y - state.drawStart.y);
    rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="region-drawing" />`;
  }
  svg.innerHTML = rects;
}

function getExtractions() {
  const ext = state.docDetail?.latestExtraction;
  if (!ext?.extractions) return [];
  return Array.isArray(ext.extractions) ? ext.extractions : [];
}

function selectExtraction(idx) {
  if (state.tool !== "select") return;
  setState({ selectedExtraction: state.selectedExtraction === idx ? null : idx });
  updateOverlay();
}

function selectGTField(idx) {
  if (state.tool !== "select") return;
  setState({ selectedExtraction: idx });
}

// ─── Drawing ─────────────────────────────────────────────
function initDrawListeners() {
  const container = document.getElementById("pdf-container");
  if (!container) return;
  container.onmousedown = (e) => {
    if (state.tool !== "draw") return;
    const rect = container.getBoundingClientRect();
    state.drawStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    state.drawCurrent = { ...state.drawStart };
  };
  container.onmousemove = (e) => {
    if (!state.drawStart || state.tool !== "draw") return;
    const rect = container.getBoundingClientRect();
    state.drawCurrent = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    updateOverlay();
  };
  container.onmouseup = (e) => {
    if (!state.drawStart || state.tool !== "draw") return;
    const rect = container.getBoundingClientRect();
    const end = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    const x = Math.min(state.drawStart.x, end.x) / state.canvasWidth;
    const y = Math.min(state.drawStart.y, end.y) / state.canvasHeight;
    const w = Math.abs(end.x - state.drawStart.x) / state.canvasWidth;
    const h = Math.abs(end.y - state.drawStart.y) / state.canvasHeight;
    if (w > 0.01 && h > 0.005) {
      const discovery = {
        id: uuid(), annotationType: "discovery",
        drawnRegion: { spans: [{ page: state.currentPage, bounds: { x, y, w, h } }] },
        discoveredKind: "", discoveredPayload: null,
        confusionClass: null, rationale: "", _needsDetail: true,
      };
      state.annotations.push(discovery);
      setState({ selectedExtraction: null, drawStart: null, drawCurrent: null, tool: "select" });
    } else {
      state.drawStart = null; state.drawCurrent = null;
    }
    updateOverlay();
  };
}

// ─── Annotation Actions ──────────────────────────────────
function addVerdict(extIdx, verdict) {
  const ext = getExtractions()[extIdx];
  const existing = state.annotations.findIndex(a => a.interpretationId === (ext?.id || `ext-${extIdx}`));
  const ann = {
    id: uuid(), annotationType: "correction",
    interpretationId: ext?.id || `ext-${extIdx}`,
    verdict, correctedPayload: null, confusionClass: null, rationale: "", _extIdx: extIdx,
  };
  if (existing >= 0) state.annotations[existing] = ann;
  else state.annotations.push(ann);
  setState({});
  updateOverlay();
}

function updateAnnotationField(annId, field, value) {
  const ann = state.annotations.find(a => a.id === annId);
  if (ann) ann[field] = value;
}

function removeAnnotation(annId) {
  state.annotations = state.annotations.filter(a => a.id !== annId);
  setState({});
  updateOverlay();
}

async function submitAnnotations() {
  if (state.annotations.length === 0) return;
  setState({ loading: true });
  try {
    const payload = {
      sessionId: state.sessionId, documentId: state.selectedDoc,
      annotatorId: "seed-console", annotatorLevel: "L0",
      annotations: state.annotations.map(a => ({
        id: a.id, annotationType: a.annotationType,
        interpretationId: a.interpretationId || null, verdict: a.verdict || null,
        correctedPayload: a.correctedPayload || null, drawnRegion: a.drawnRegion || null,
        discoveredKind: a.discoveredKind || null, discoveredPayload: a.discoveredPayload || null,
        sourceRegion: a.sourceRegion || null, targetRegion: a.targetRegion || null,
        connectionType: a.connectionType || null, confusionClass: a.confusionClass || null,
        rationale: a.rationale || "",
      })),
    };
    await api("/v1/seed/annotate-visual", { method: "POST", body: payload });
    if (state.sessionId) {
      await api("/v1/seed/session/complete", { method: "POST", body: { sessionId: state.sessionId, durationSeconds: 0, notes: `${state.annotations.length} annotations` } });
    }
    const docDetail = await api(`/v1/seed/document/${state.selectedDoc}`);
    setState({ annotations: [], docDetail, loading: false, selectedExtraction: null, sessionId: null });
    updateOverlay();
  } catch (e) {
    setState({ loading: false, error: e.message });
  }
}

// ─── Audit Actions ───────────────────────────────────────
async function loadAuditSessions() {
  setState({ auditLoading: true, auditView: "sessions", selectedAuditSession: null, selectedAuditDoc: null });
  try {
    let sessions = await auditApi("/v1/admin/audit/sessions");
    if (!Array.isArray(sessions)) sessions = sessions.sessions || sessions.data || [];
    setState({ auditSessions: sessions, auditLoading: false });
  } catch (e) {
    setState({ auditLoading: false, error: e.message });
  }
}

async function loadAuditSession(sessionId) {
  setState({ auditLoading: true, auditView: "session", selectedAuditSession: sessionId, selectedAuditDoc: null });
  try {
    const data = await auditApi(`/v1/admin/audit/session/${sessionId}`);
    setState({ auditSessionDetail: data, auditLoading: false });
  } catch (e) {
    setState({ auditLoading: false, error: e.message });
  }
}

async function loadAuditDocument(docId) {
  setState({
    auditLoading: true, auditView: "document", selectedAuditDoc: docId,
    auditPageData: null, auditPageIndex: null, auditPhiBoxes: null,
    auditPdfDoc: null, auditCurrentPage: 1, auditCanvasWidth: 0, auditCanvasHeight: 0,
    auditTab: "detail", auditFieldView: "list", auditPhiView: "list",
    auditSelectedField: null, auditSelectedPhi: null,
    auditFieldFilter: "all", auditPdfScale: 1.0, auditRenderTask: null,
  });
  try {
    let doc = await auditApi(`/v1/admin/audit/document/${docId}`);
    if (doc.document) doc = doc.document;
    setState({ auditDocDetail: doc, auditLoading: false });
    if ((doc.page_count || 0) >= 1) {
      loadAuditPage(docId, 1);
    }
  } catch (e) {
    setState({ auditLoading: false, error: e.message });
  }
}

async function loadAuditPage(docId, pageIndex) {
  state.auditPageIndex = pageIndex;
  state.auditCurrentPage = pageIndex;
  state.auditPageData = null;
  state.auditPhiBoxes = null;
  state.auditSelectedField = null;
  state.auditSelectedPhi = null;
  state.auditFieldView = "list";
  state.auditPhiView = "list";
  render();
  try {
    const [pageData, phiData] = await Promise.all([
      auditApi(`/v1/admin/audit/document/${docId}/page/${pageIndex}`),
      auditApi(`/v1/admin/audit/document/${docId}/phi-boxes/${pageIndex}`)
        .catch(err => { console.warn("phi-boxes fetch failed:", err.message); return { phi_boxes: [] }; }),
    ]);
    setState({ auditPageData: pageData, auditPhiBoxes: phiData, auditPageIndex: pageIndex });
    if (state.auditPdfDoc) {
      setTimeout(() => renderAuditPdfPage(pageIndex), 50);
    }
  } catch (e) {
    setState({ error: e.message });
  }
}

// ─── Audit PDF Viewer (AP-9) ────────────────────────────
function handleAuditPdfFile(input) {
  const file = input.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function() {
    try {
      const pdfDoc = await pdfjsLib.getDocument({ data: reader.result }).promise;
      state.auditPdfDoc = pdfDoc;
      if (state.auditPageIndex != null) {
        state.auditCurrentPage = state.auditPageIndex;
        render();
        setTimeout(() => renderAuditPdfPage(state.auditCurrentPage), 50);
      } else {
        state.auditCurrentPage = 1;
        render();
        setTimeout(() => renderAuditPdfPage(1), 50);
      }
    } catch (e) { console.error("Audit PDF load error:", e); }
  };
  reader.readAsArrayBuffer(file);
}

async function renderAuditPdfPage(pageNum) {
  const pdfDoc = state.auditPdfDoc;
  if (!pdfDoc) return;
  // Hardened cancel — rapid setState/zoom/page-change bursts were still racing
  // through task.cancel() without fully tearing down the prior canvas ctx,
  // producing "Cannot use the same canvas during multiple render() operations".
  // Cancel, null out, yield 50ms for pdf.js to finish unwinding, then proceed.
  if (state.auditRenderTask) {
    try { state.auditRenderTask.cancel(); } catch (_) {}
    state.auditRenderTask = null;
    await new Promise(r => setTimeout(r, 50));
  }
  const page = await pdfDoc.getPage(pageNum);
  const scale = 1.5 * (state.auditPdfScale || 1);
  const viewport = page.getViewport({ scale });
  const canvas = document.getElementById("audit-pdf-canvas");
  if (!canvas) return;
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  state.auditCanvasWidth = viewport.width;
  state.auditCanvasHeight = viewport.height;
  const ctx = canvas.getContext("2d");
  const task = page.render({ canvasContext: ctx, viewport });
  state.auditRenderTask = task;
  try {
    await task.promise;
  } catch (e) {
    // pdf.js throws RenderingCancelledException when cancel() is called — ignore it.
    if (e && e.name !== "RenderingCancelledException") console.error("audit PDF render:", e);
    return;
  } finally {
    if (state.auditRenderTask === task) state.auditRenderTask = null;
  }
  updateAuditOverlay();
}

// AP-10c — extract span list from new or legacy bounding_box shape
function extractBoxSpans(bb) {
  if (!bb) return [];
  if (Array.isArray(bb.spans)) return bb.spans;
  if (bb.x != null) {
    return [{ page: bb.page || 1, x: bb.x, y: bb.y, width: bb.width ?? bb.w, height: bb.height ?? bb.h }];
  }
  return [];
}

// PHI records from the /phi-boxes/:n endpoint carry the box under
// `field_bounding_box`; other shapes use `bounding_box`. Always read through
// this helper so both are handled identically.
function extractPhiBoxSpans(p) {
  if (!p) return [];
  return extractBoxSpans(p.field_bounding_box ?? p.bounding_box);
}

function getFilteredAuditFields() {
  const fields = Array.isArray(state.auditPageData?.fields) ? state.auditPageData.fields : [];
  const filter = state.auditFieldFilter || "all";
  if (filter === "all") return fields;
  return fields.filter(f => {
    const ft = (f.field_type || f.fieldType || "").toLowerCase();
    return ft === filter;
  });
}

function updateAuditOverlay() {
  const svg = document.getElementById("audit-overlay-svg");
  if (!svg) return;
  // FIX 2 — read canvas dimensions live from the DOM so zoom changes are reflected
  // immediately. Also explicitly set width/height attrs on the SVG so it physically
  // matches the canvas (not just the viewBox — CSS 100%/100% can lag one frame).
  const canvas = document.getElementById("audit-pdf-canvas");
  if (!canvas) { svg.innerHTML = ""; return; }
  const W = canvas.width;
  const H = canvas.height;
  if (!W || !H) { svg.innerHTML = ""; return; }
  svg.setAttribute("width", W);
  svg.setAttribute("height", H);
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

  const tab = state.auditTab || "detail";
  if (tab !== "fields" && tab !== "phi") { svg.innerHTML = ""; return; }

  let rects = "";
  const curPage = state.auditCurrentPage || state.auditPageIndex || 1;

  if (tab === "fields") {
    const fields = getFilteredAuditFields();
    const selIdx = state.auditSelectedField;
    const dim = selIdx != null;
    fields.forEach((f, i) => {
      const spans = extractBoxSpans(f.bounding_box);
      spans.forEach(sp => {
        // Accept span-level, record-level, or default to current page
        // (page data endpoint is already page-scoped).
        const spanPage = sp.page ?? f.page ?? curPage;
        if (spanPage !== curPage) return;
        const x = (sp.x || 0) * W;
        const y = (1 - (sp.y || 0) - (sp.height ?? sp.h ?? 0)) * H;
        const w = (sp.width ?? sp.w ?? 0) * W;
        const h = (sp.height ?? sp.h ?? 0) * H;
        let cls = "box-field";
        if (selIdx === i) cls += " sel";
        else if (dim) cls += " dim";
        rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="${cls}" onclick="selectAuditField(${i})"/>`;
        if (sp.value_x != null) {
          const vx = sp.value_x * W;
          const vy = (1 - (sp.value_y || 0) - (sp.value_height ?? sp.value_h ?? 0)) * H;
          const vw = (sp.value_width ?? sp.value_w ?? 0) * W;
          const vh = (sp.value_height ?? sp.value_h ?? 0) * H;
          let vcls = "box-field-val";
          if (selIdx === i) vcls += " sel";
          else if (dim) vcls += " dim";
          rects += `<rect x="${vx}" y="${vy}" width="${vw}" height="${vh}" class="${vcls}" onclick="selectAuditField(${i})"/>`;
        }
      });
    });
  }

  if (tab === "phi") {
    // PHI records from /phi-boxes/:n carry their bbox under `field_bounding_box`;
    // extractPhiBoxSpans handles both that shape and the legacy `bounding_box`.
    const phi = getDedupedPhiBoxes();
    const selIdx = state.auditSelectedPhi;
    const dim = selIdx != null;
    phi.forEach((p, i) => {
      const spans = extractPhiBoxSpans(p);
      spans.forEach(sp => {
        // phi-boxes endpoint is already page-scoped, so page may be missing
        // from the span. Fall back to the record's page, then to current page.
        const spanPage = sp.page ?? p.page ?? curPage;
        if (spanPage !== curPage) return;
        const x = (sp.x || 0) * W;
        const y = (1 - (sp.y || 0) - (sp.height ?? sp.h ?? 0)) * H;
        const w = (sp.width ?? sp.w ?? 0) * W;
        const h = (sp.height ?? sp.h ?? 0) * H;
        let cls = "box-phi";
        if (selIdx === i) cls += " sel";
        else if (dim) cls += " dim";
        rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="${cls}" onclick="selectAuditPhi(${i})"/>`;
      });
    });
  }

  svg.innerHTML = rects;
}

function getDedupedPhiBoxes() {
  const raw = state.auditPhiBoxes;
  let arr;
  if (Array.isArray(raw)) arr = raw;
  else if (Array.isArray(raw?.phi_boxes)) arr = raw.phi_boxes;
  else if (Array.isArray(raw?.phi)) arr = raw.phi;
  else arr = [];

  const map = new Map();
  let anon = 0;
  arr.forEach(p => {
    const id = p.field_id ?? p.fieldId ?? p.id ?? `__anon_${anon++}`;
    if (!map.has(id)) {
      map.set(id, p);
    } else {
      const existing = map.get(id);
      // Write merged spans into field_bounding_box so subsequent reads via
      // extractPhiBoxSpans (which prefers field_bounding_box) see the union.
      const merged = {
        ...existing,
        field_bounding_box: { spans: extractPhiBoxSpans(existing).concat(extractPhiBoxSpans(p)) },
        bounding_box: undefined,
      };
      map.set(id, merged);
    }
  });
  return Array.from(map.values());
}

// ─── Render Helpers ──────────────────────────────────────
function badge(text, color) { return `<span class="badge badge-${color}">${text}</span>`; }
function statusColor(s) { return { pending: "amber", ocr_complete: "blue", extracted: "purple", annotated: "green" }[s] || "gray"; }
function statCard(label, value, color, sub) { return `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value" style="color:${color || 'var(--accent)'}">${value}</div>${sub ? `<div class="stat-sub">${sub}</div>` : ""}</div>`; }
function confusionClassOptions(selected) {
  return CONFUSION_CLASSES.map(g => `<optgroup label="${g.group}">${g.classes.map(c => `<option value="${c}" ${selected === c ? 'selected' : ''}>${c}</option>`).join("")}</optgroup>`).join("");
}
function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
    + " " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
}

// ─── Audit Views ─────────────────────────────────────────
function renderAudit() {
  if (state.auditView === "document") return renderAuditDocument();
  if (state.auditView === "session") return renderAuditSession();
  return renderAuditSessions();
}

function renderAuditSessions() {
  if (state.auditLoading) return `<div class="loading">Loading audit sessions...</div>`;
  const sessions = state.auditSessions || [];
  const openCount = sessions.filter(s => !s.completed_at).length;
  const totalDocs = sessions.reduce((sum, s) => sum + (s.document_count || 0), 0);

  let html = `<div style="margin-bottom:20px"><div class="section-title">Audit Sessions</div><div class="section-sub">Extraction audit telemetry</div></div>`;
  html += `<div class="stat-row">${statCard("Sessions", sessions.length, "var(--accent)")}${statCard("Open", openCount, "var(--amber)")}${statCard("Documents", totalDocs, "var(--purple)")}</div>`;

  if (sessions.length === 0) {
    html += `<div class="queue-empty">No audit sessions found</div>`;
  } else {
    html += `<div class="audit-col-header"><span>Created</span><span>Label</span><span>Docs</span><span>Status</span></div>`;
    sessions.forEach(s => {
      const isComplete = !!s.completed_at;
      html += `<div class="audit-row" onclick="loadAuditSession('${s.id}')">
        <span style="color:var(--text-dim);font-size:11px">${formatDate(s.created_at)}</span>
        <span>${s.session_label || s.label || "—"}</span>
        <span>${s.document_count || 0}</span>
        <span>${isComplete ? badge("complete", "green") : badge("open", "amber")}</span>
      </div>`;
    });
  }
  return html;
}

function renderAuditSession() {
  if (state.auditLoading) return `<div class="loading">Loading session...</div>`;

  if (!data) return `<div class="loading">No session data</div>`;
  const summary = data.summary || data;
  const documents = data.documents || [];

  const tier1Display = summary.tier1_rate != null ? (summary.tier1_rate * 100).toFixed(1) + "%" : "—";
  const tier1Color = summary.tier1_rate >= 0.8 ? "var(--green)" : summary.tier1_rate >= 0.6 ? "var(--amber)" : "var(--red)";
  const phiCountDisplay = summary.total_phi_detections ?? "—";
  const phiBreakdown = summary.phi_by_token_type && typeof summary.phi_by_token_type === "object"
    ? Object.entries(summary.phi_by_token_type).map(([k, v]) => `${k}: ${v}`).join(" · ")

    ${statCard("Tier 1 Rate", tier1Display, tier1Color)}
    ${statCard("PHI Detections", phiCountDisplay, "var(--red)", phiBreakdown)}

    html += `<div class="audit-doc-col-header"><span>Filename</span><span>Category</span><span>Pages</span><span>T1</span><span>T2</span><span>T3</span></div>`;
    documents.forEach(doc => {

        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${doc.document_filename || doc.filename || "—"}</span>
        <span>${badge(doc.document_category || doc.category || "—", "blue")}</span>

}

// ─── AP-10c — Fields tab ─────────────────────────────────
function renderAuditFieldsTab() {
  if (state.auditFieldView === "detail") return renderAuditFieldDetail();
  const pd = state.auditPageData;
  if (!pd) {
    return `<div class="adi-placeholder">${state.auditPageIndex ? `Loading page ${state.auditPageIndex}…` : 'No page loaded'}</div>`;
  }
  const fields = getFilteredAuditFields();
  const totalAll = Array.isArray(pd.fields) ? pd.fields.length : 0;
  const filtered = state.auditFieldFilter !== 'all';

  let html = `<div class="adi-list-header">
    <span class="adi-list-title">Fields (${fields.length}${filtered ? ' / ' + totalAll : ''})</span>
  </div>`;

  html += `<div class="adi-filter-row">
    <span class="adi-filter-label">Type</span>
    <select class="adi-filter-select" onchange="setAuditFieldFilter(this.value)">
      <option value="all" ${state.auditFieldFilter === 'all' ? 'selected' : ''}>All</option>
      <option value="clinical" ${state.auditFieldFilter === 'clinical' ? 'selected' : ''}>Clinical</option>
      <option value="temporal" ${state.auditFieldFilter === 'temporal' ? 'selected' : ''}>Temporal</option>
      <option value="provider" ${state.auditFieldFilter === 'provider' ? 'selected' : ''}>Provider</option>
    </select>
  </div>`;

  if (fields.length === 0) {
    html += `<div class="adi-placeholder">No fields on this page</div>`;
    return html;
  }

  fields.forEach((f, i) => {
    const ftRaw = f.field_type ?? f.fieldType;
    const ft = ftRaw != null ? String(ftRaw).toLowerCase() : null;
    const ftBadge = (ft === 'clinical' || ft === 'temporal' || ft === 'provider') ? ft : '';
    const ftLabel = ft != null ? ft.slice(0, 4).toUpperCase() : '—';
    const kind = f.entity_kind || f.entityKind || f.kind || '—';
    const conf = f.confidence != null ? Math.round(f.confidence * 100) + '%' : '—';
    const tier = f.tier ?? f.tier_level ?? null;
    const tierCls = tier ? `t${tier}` : '';
    const isSel = state.auditSelectedField === i;
    html += `<div class="adi-field-row ${isSel ? 'selected' : ''}" onclick="selectAuditField(${i})">
      <span class="type-badge ${ftBadge}">${ftLabel}</span>
      <span class="kind">${escapeHtml(String(kind))}</span>
      <span class="conf">${conf}</span>
      ${tier != null ? `<span class="tier ${tierCls}">T${tier}</span>` : ''}
    </div>`;
  });

  return html;
}

function setAuditFieldFilter(filter) {
  state.auditFieldFilter = filter;
  state.auditSelectedField = null;
  render();
  if (state.auditPdfDoc && state.auditPageIndex != null) {
    setTimeout(() => updateAuditOverlay(), 30);
  }
}

function selectAuditField(idx) {
  state.auditSelectedField = idx;
  state.auditFieldView = "detail";
  render();
  if (state.auditPdfDoc && state.auditPageIndex != null) {
    setTimeout(() => {
      updateAuditOverlay();
      scrollAuditFieldIntoView(idx);
    }, 30);
  }
}

function backToAuditFieldsList() {
  state.auditFieldView = "list";
  state.auditSelectedField = null;
  render();
  if (state.auditPdfDoc && state.auditPageIndex != null) {
    setTimeout(() => updateAuditOverlay(), 30);
  }
}

function scrollAuditFieldIntoView(idx) {
  const area = document.getElementById("adi-canvas-area");
  if (!area) return;
  const fields = getFilteredAuditFields();
  const f = fields[idx];
  if (!f) return;
  const curPage = state.auditCurrentPage || state.auditPageIndex || 1;
  const sp = extractBoxSpans(f.bounding_box).find(s => (s.page || 1) === curPage);
  if (!sp) return;
  const H = state.auditCanvasHeight;
  const y = (sp.y || 0) * H;
  const h = (sp.height ?? sp.h ?? 0) * H;
  // Canvas sits inside .pdf-container which is inside .adi-canvas-area with padding.
  const container = area.querySelector(".pdf-container");
  const containerTop = container ? (container.offsetTop || 0) : 0;
  const target = containerTop + y + (h / 2) - (area.clientHeight / 2);
  area.scrollTo({ top: Math.max(0, target), behavior: "smooth" });
}

function renderAuditFieldDetail() {
  const idx = state.auditSelectedField;
  const fields = getFilteredAuditFields();
  const f = idx != null ? fields[idx] : null;
  if (!f) {
    return `<button class="adi-back" onclick="backToAuditFieldsList()">\u2190 Fields</button>
      <div class="adi-placeholder">Field no longer available</div>`;
  }
  const ftRaw = f.field_type ?? f.fieldType;
  const ft = ftRaw != null ? String(ftRaw).toLowerCase() : '—';
  const kind = f.entity_kind || f.entityKind || f.kind || '—';
  const pass = f.extraction_pass ?? f.pass ?? f.extractionPass ?? '—';
  const conf = f.confidence != null ? `${(f.confidence * 100).toFixed(1)}%` : '—';
  const tier = f.tier ?? f.tier_level;
  // Display convention only — these labels are a local UI mapping of the
  // tier integer, not authoritative API data. The API returns only the
  // integer; any rename of the tiers must update this mapping.
  const tierLabelMap = { 1: 'Auto-accepted', 2: 'Smart review', 3: 'Explicit approval' };
  const tierLabel = tierLabelMap[tier] || '—';
  const autoAcc = f.auto_accepted ?? f.autoAccepted;
  const reconciled = f.was_reconciled ?? f.wasReconciled;
  const spans = extractBoxSpans(f.bounding_box);
  const hasValueBbox = spans.some(s => s.value_x != null);
  const aiValue = f.value ?? null;
  const sourceText = f.source_text ?? null;

  const kv = (k, v) => `<div class="adi-kv"><span class="k">${k}</span><span class="v">${v}</span></div>`;
  const bool = (b) => b == null ? '—' : (b ? 'Yes' : 'No');
  const fmt3 = (n) => (n == null ? '—' : Number(n).toFixed(3));

  let html = `<button class="adi-back" onclick="backToAuditFieldsList()">\u2190 Fields</button>`;

  html += `<div class="adi-card">
    <div class="adi-card-title">Extracted Data</div>
    <div class="adi-kv"><span class="k">AI Extracted Value</span><span class="v">${aiValue != null ? escapeHtml(String(aiValue)) : '—'}</span></div>
    <div style="margin-top:10px;padding-top:8px;border-top:1px dashed var(--border)">
      <div style="font-size:10px;font-family:var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Source Text</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text);white-space:pre-wrap;word-break:break-word;line-height:1.5">${sourceText != null ? escapeHtml(String(sourceText)) : '—'}</div>
    </div>
  </div>`;

  html += `<div class="adi-card">
    <div class="adi-card-title">Classification</div>
    ${kv('Field type', escapeHtml(ft))}
    ${kv('Entity kind', escapeHtml(String(kind)))}
    ${kv('Extraction pass', escapeHtml(String(pass)))}
  </div>`;

  html += `<div class="adi-card">
    <div class="adi-card-title">Confidence &amp; Tier</div>
    ${kv('Confidence', conf)}
    ${kv('Tier', tier != null ? `${tier} — ${tierLabel}` : '—')}
    ${kv('Auto accepted', bool(autoAcc))}
    ${kv('Was reconciled', bool(reconciled))}
  </div>`;

  html += `<div class="adi-card">
    <div class="adi-card-title">Bounding Box</div>
    ${kv('Span count', spans.length)}`;
  spans.forEach((sp, si) => {
    const coordStr = `x=${fmt3(sp.x)}, y=${fmt3(sp.y)}, w=${fmt3(sp.width ?? sp.w)}, h=${fmt3(sp.height ?? sp.h)}`;
    html += `<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)">
      ${kv(`Span ${si+1}`, `Page ${sp.page || 1}`)}
      <div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono);padding:4px 0">${coordStr}</div>`;
    if (sp.value_x != null) {
      const vStr = `x=${fmt3(sp.value_x)}, y=${fmt3(sp.value_y)}, w=${fmt3(sp.value_width ?? sp.value_w)}, h=${fmt3(sp.value_height ?? sp.value_h)}`;
      html += `<div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono);padding:2px 0">value bbox: ${vStr}</div>`;
    }
    html += `</div>`;
  });
  if (hasValueBbox) {
    html += `<div style="margin-top:8px">${kv('Tight bbox', 'Yes — value bounds differ from span')}</div>`;
  }
  html += `</div>`;

  html += `<div class="adi-card">
    <div class="adi-card-title">ADI Training</div>
    <div style="color:var(--text-dim);font-size:11px;font-family:var(--font-mono);text-align:center;padding:12px 4px;line-height:1.5">Correction and training controls coming in a future sprint</div>
  </div>`;

  return html;
}

// ─── AP-10c — PHI tab ────────────────────────────────────
function renderAuditPhiTab() {
  if (state.auditPhiView === "detail") return renderAuditPhiDetail();
  if (state.auditPhiBoxes == null) {
    return `<div class="adi-placeholder">${state.auditPageIndex ? `Loading PHI for page ${state.auditPageIndex}…` : 'No page loaded'}</div>`;
  }
  const phi = getDedupedPhiBoxes();

  let html = `<div class="adi-list-header">
    <span class="adi-list-title">PHI Detections (${phi.length})</span>
  </div>`;

  if (phi.length === 0) {
    html += `<div class="adi-placeholder">No PHI detections on this page</div>`;
    return html;
  }

  phi.forEach((p, i) => {
    const token = String(p.token_type || p.tokenType || '—').toUpperCase();
    const placeholder = p.token_placeholder || p.tokenPlaceholder || '';
    const kind = p.entity_kind || p.entityKind || '—';
    const isSel = state.auditSelectedPhi === i;
    html += `<div class="adi-field-row ${isSel ? 'selected' : ''}" onclick="selectAuditPhi(${i})">
      <span class="adi-phi-dot"></span>
      <span class="type-badge" style="background:var(--red-bg);color:var(--red);border:1px solid #ef444440">${escapeHtml(token)}</span>
      <span class="kind">${escapeHtml(String(kind))}</span>
      <span class="adi-phi-placeholder" title="${escapeHtml(placeholder)}">${escapeHtml(placeholder)}</span>
    </div>`;
  });

  return html;
}

function selectAuditPhi(idx) {
  state.auditSelectedPhi = idx;
  state.auditPhiView = "detail";
  render();
  if (state.auditPdfDoc && state.auditPageIndex != null) {
    setTimeout(() => {
      updateAuditOverlay();
      scrollAuditPhiIntoView(idx);
    }, 30);
  }
}

function backToAuditPhiList() {
  state.auditPhiView = "list";
  state.auditSelectedPhi = null;
  render();
  if (state.auditPdfDoc && state.auditPageIndex != null) {
    setTimeout(() => updateAuditOverlay(), 30);
  }
}

function scrollAuditPhiIntoView(idx) {
  const area = document.getElementById("adi-canvas-area");
  if (!area) return;
  const phi = getDedupedPhiBoxes();
  const p = phi[idx];
  if (!p) return;
  const curPage = state.auditCurrentPage || state.auditPageIndex || 1;
  const sp = extractPhiBoxSpans(p).find(s => (s.page ?? p.page ?? curPage) === curPage);
  if (!sp) return;
  const H = state.auditCanvasHeight;
  const y = (sp.y || 0) * H;
  const h = (sp.height ?? sp.h ?? 0) * H;
  const container = area.querySelector(".pdf-container");
  const containerTop = container ? (container.offsetTop || 0) : 0;
  const target = containerTop + y + (h / 2) - (area.clientHeight / 2);
  area.scrollTo({ top: Math.max(0, target), behavior: "smooth" });
}

function renderAuditPhiDetail() {
  const idx = state.auditSelectedPhi;
  const phi = getDedupedPhiBoxes();
  const p = idx != null ? phi[idx] : null;
  if (!p) {
    return `<button class="adi-back" onclick="backToAuditPhiList()">\u2190 PHI</button>
      <div class="adi-placeholder">PHI record no longer available</div>`;
  }
  const tokenRaw = p.token_type ?? p.tokenType;
  const token = tokenRaw != null ? String(tokenRaw).toUpperCase() : '—';
  const placeholder = p.token_placeholder ?? p.tokenPlaceholder ?? '—';
  const kind = p.entity_kind || p.entityKind || '—';
  const ftRaw = p.field_type ?? p.fieldType;
  const ft = ftRaw != null ? String(ftRaw).toLowerCase() : '—';
  const spans = extractPhiBoxSpans(p);

  const kv = (k, v) => `<div class="adi-kv"><span class="k">${k}</span><span class="v">${v}</span></div>`;
  const fmt3 = (n) => (n == null ? '—' : Number(n).toFixed(3));

  let html = `<button class="adi-back" onclick="backToAuditPhiList()">\u2190 PHI</button>`;

  html += `<div class="adi-card">
    <div class="adi-card-title">PHI Detection</div>
    <div class="adi-kv"><span class="k">Token Placeholder</span><span class="v" style="font-family:var(--font-mono);color:var(--red);max-width:70%">${escapeHtml(String(placeholder))}</span></div>
  </div>`;

  html += `<div class="adi-card">
    <div class="adi-card-title">Classification</div>
    ${kv('Token type', escapeHtml(token))}
    ${kv('Entity kind', escapeHtml(String(kind)))}
    ${kv('Field type', escapeHtml(ft))}
  </div>`;

  html += `<div class="adi-card">
    <div class="adi-card-title">Bounding Box</div>
    ${kv('Span count', spans.length)}`;
  spans.forEach((sp, si) => {
    const coordStr = `x=${fmt3(sp.x)}, y=${fmt3(sp.y)}, w=${fmt3(sp.width ?? sp.w)}, h=${fmt3(sp.height ?? sp.h)}`;
    html += `<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)">
      ${kv(`Span ${si+1}`, `Page ${sp.page || 1}`)}
      <div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono);padding:4px 0">${coordStr}</div>
    </div>`;
  });
  html += `</div>`;

  return html;
}

// ─── AP-10c interaction helpers ───────────────────────────
function switchAuditTab(tab) {
  state.auditTab = tab;
  state.auditFieldView = 'list';
  state.auditPhiView = 'list';
  state.auditSelectedField = null;
  state.auditSelectedPhi = null;
  render();
  if (state.auditPdfDoc && state.auditPageIndex != null) {
    setTimeout(() => updateAuditOverlay(), 30);
  }
}

function auditPageDelta(delta) {
  const pc = state.auditDocDetail?.page_count || 0;
  if (pc === 0) return;
  const cur = state.auditPageIndex || 1;
  const newPage = cur + delta;
  if (newPage >= 1 && newPage <= pc) {
    loadAuditPage(state.selectedAuditDoc, newPage);
  }
}

function auditZoomDelta(delta) {
  const next = Math.max(0.5, Math.min(3.0, (state.auditPdfScale || 1) + delta));
  if (Math.abs(next - (state.auditPdfScale || 1)) < 0.001) return;
  state.auditPdfScale = next;
  render();
  if (state.auditPdfDoc && state.auditPageIndex != null) {
    setTimeout(() => renderAuditPdfPage(state.auditPageIndex), 30);
  }
}

// ─── AP-10c Step 6 — pinch / wheel zoom gestures ─────────
// During an active gesture we avoid full render() on every frame (which would
// thrash the DOM at 60fps). Instead we patch the zoom % text and re-render the
// PDF canvas via rAF. A single render() on gesture end refreshes +/- disabled.
let _auditZoomRaf = null;
let _auditGestureStartScale = 1;
let _auditPinchStartDist = 0;

function _auditAdjustScale(next) {
  const clamped = Math.max(0.5, Math.min(3.0, next));
  if (Math.abs(clamped - (state.auditPdfScale || 1)) < 0.001) return;
  state.auditPdfScale = clamped;
  if (_auditZoomRaf) return;
  _auditZoomRaf = requestAnimationFrame(() => {
    _auditZoomRaf = null;
    const zoomSpan = document.querySelector(".adi-zoom span");
    if (zoomSpan) zoomSpan.textContent = Math.round((state.auditPdfScale || 1) * 100) + "%";
    if (state.auditPdfDoc && state.auditPageIndex != null) {
      renderAuditPdfPage(state.auditPageIndex);
    }
  });
}

function _auditHandleWheel(e) {
  // macOS trackpad pinch → wheel with ctrlKey. Ctrl+scroll on desktop too.
  if (!e.ctrlKey) return;
  e.preventDefault();
  _auditAdjustScale((state.auditPdfScale || 1) + (-e.deltaY * 0.01));
}
function _auditHandleGestureStart(e) {
  e.preventDefault();
  _auditGestureStartScale = state.auditPdfScale || 1;
}
function _auditHandleGestureChange(e) {
  e.preventDefault();
  _auditAdjustScale(_auditGestureStartScale * e.scale);
}
function _auditHandleGestureEnd(e) {
  e.preventDefault();
  render();
}
function _auditHandleTouchStart(e) {
  if (e.touches.length !== 2) return;
  _auditPinchStartDist = Math.hypot(
    e.touches[0].clientX - e.touches[1].clientX,
    e.touches[0].clientY - e.touches[1].clientY
  );
  _auditGestureStartScale = state.auditPdfScale || 1;
}
function _auditHandleTouchMove(e) {
  if (e.touches.length !== 2 || !_auditPinchStartDist) return;
  e.preventDefault();
  const dist = Math.hypot(
    e.touches[0].clientX - e.touches[1].clientX,
    e.touches[0].clientY - e.touches[1].clientY
  );
  _auditAdjustScale(_auditGestureStartScale * (dist / _auditPinchStartDist));
}
function _auditHandleTouchEnd() {
  if (_auditPinchStartDist) {
    _auditPinchStartDist = 0;
    render();
  }
}

function bindAuditPdfGestures() {
  const area = document.getElementById("adi-canvas-area");
  if (!area) return;
  area.addEventListener("wheel", _auditHandleWheel, { passive: false });
  area.addEventListener("gesturestart", _auditHandleGestureStart);
  area.addEventListener("gesturechange", _auditHandleGestureChange);
  area.addEventListener("gestureend", _auditHandleGestureEnd);
  area.addEventListener("touchstart", _auditHandleTouchStart, { passive: false });
  area.addEventListener("touchmove", _auditHandleTouchMove, { passive: false });
  area.addEventListener("touchend", _auditHandleTouchEnd);
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ─── Workspace ───────────────────────────────────────────
function renderWorkspace() {
  if (state.loading && !state.docDetail) return `<div class="loading">Loading document...</div>`;
  const doc = state.docDetail?.document;
  if (!doc) return `<div class="loading">Document not found</div>`;
  const hasPdf = !!doc.render_data;
  const extractions = getExtractions();
  const selExt = state.selectedExtraction !== null ? extractions[state.selectedExtraction] : null;
  const gt = doc.ground_truth || [];
  const selGT = (!selExt && state.selectedExtraction !== null) ? gt[state.selectedExtraction] : null;

  let panelContent = "";
  panelContent += `<div class="tool-bar">
    <button class="tool-btn ${state.tool === 'select' ? 'active' : ''}" onclick="setState({tool:'select'})">⊡ Select</button>
    <button class="tool-btn ${state.tool === 'draw' ? 'active' : ''}" onclick="setState({tool:'draw'})">✎ Draw Region</button>
  </div>`;

  if (selExt || selGT) {
    const field = selExt || selGT;
    const label = field.label || field.fieldType || "Unknown field";
    const value = field.value || "—";
    const unit = field.unit || "";
    const conf = field.confidence != null ? `${(field.confidence * 100).toFixed(0)}%` : "—";
    const existingAnn = selExt ? state.annotations.find(a => a.interpretationId === (selExt.id || `ext-${state.selectedExtraction}`)) : null;
    panelContent += `<div class="ext-detail">
      <div class="ext-detail-field">${label}</div>
      <div class="ext-detail-value">${value} ${unit}</div>
      <div class="ext-detail-meta">Confidence: ${conf} ${field.canonicalId ? `· ${field.canonicalId}` : ""}</div>
      <div class="verdict-row">
        <button class="verdict-btn ${existingAnn?.verdict === 'confirmed' ? 'v-confirmed' : ''}" onclick="addVerdict(${state.selectedExtraction},'confirmed')">✓ Confirm</button>
        <button class="verdict-btn ${existingAnn?.verdict === 'corrected' ? 'v-corrected' : ''}" onclick="addVerdict(${state.selectedExtraction},'corrected')">✎ Correct</button>
        <button class="verdict-btn ${existingAnn?.verdict === 'rejected' ? 'v-rejected' : ''}" onclick="addVerdict(${state.selectedExtraction},'rejected')">✗ Reject</button>
      </div>
      ${existingAnn?.verdict === 'corrected' ? `
        <select class="ann-select" onchange="updateAnnotationField('${existingAnn.id}','confusionClass',this.value)">
          <option value="">Confusion class...</option>${confusionClassOptions(existingAnn.confusionClass)}
        </select>` : ""}
      ${existingAnn ? `<textarea class="ann-textarea" placeholder="Rationale..." oninput="updateAnnotationField('${existingAnn.id}','rationale',this.value)">${existingAnn.rationale || ""}</textarea>` : ""}
    </div>`;
  } else {
    panelContent += `<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px">
      ${extractions.length > 0 ? "Click a highlighted region to review" : "No extractions yet. Use ✎ Draw to mark regions."}
    </div>`;
  }

  const pendingDiscoveries = state.annotations.filter(a => a.annotationType === "discovery" && a._needsDetail);
  if (pendingDiscoveries.length > 0) {
    panelContent += `<div style="margin-top:12px"><div class="field-label">New Discoveries</div>`;
    pendingDiscoveries.forEach(d => {
      panelContent += `<div class="ext-detail" style="border-color:var(--purple)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          ${badge("discovery", "purple")}
          <button class="btn btn-ghost btn-xs" style="font-size:10px;padding:2px 8px;color:var(--red)" onclick="removeAnnotation('${d.id}')">Remove</button>
        </div>
        <select class="ann-select" onchange="updateAnnotationField('${d.id}','discoveredKind',this.value)">
          <option value="">Field type...</option>
          <option value="labValue">Lab Value</option>
          <option value="medication">Medication</option>
          <option value="condition">Condition</option>
          <option value="vitalSign">Vital Sign</option>
          <option value="procedure">Procedure</option>
          <option value="provider">Provider</option>
          <option value="visitDate">Visit Date</option>
          <option value="demographic">Demographic</option>
        </select>
        <input class="ann-input" placeholder="Label (e.g. Glucose)" oninput="updateAnnotationField('${d.id}','_label',this.value)">
        <input class="ann-input" placeholder="Value" oninput="updateAnnotationField('${d.id}','_value',this.value)">
        <textarea class="ann-textarea" placeholder="Why was this missed?" oninput="updateAnnotationField('${d.id}','rationale',this.value)"></textarea>
      </div>`;
    });
    panelContent += `</div>`;
  }

  const corrections = state.annotations.filter(a => a.annotationType === "correction");
  const discoveries = state.annotations.filter(a => a.annotationType === "discovery");
  const confirmed = corrections.filter(a => a.verdict === "confirmed").length;
  const corrected = corrections.filter(a => a.verdict === "corrected").length;
  const rejected = corrections.filter(a => a.verdict === "rejected").length;

  if (state.annotations.length > 0) {
    panelContent += `<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
      <div class="field-label" style="margin-bottom:8px">Session Summary</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        ${confirmed > 0 ? badge(`${confirmed} confirmed`, "green") : ""}
        ${corrected > 0 ? badge(`${corrected} corrected`, "amber") : ""}
        ${rejected > 0 ? badge(`${rejected} rejected`, "red") : ""}
        ${discoveries.length > 0 ? badge(`${discoveries.length} discovered`, "purple") : ""}
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="submitAnnotations()" ${state.loading ? 'disabled' : ''}>
        ${state.loading ? 'Submitting...' : `Submit ${state.annotations.length} Annotation${state.annotations.length > 1 ? 's' : ''}`}
      </button>
    </div>`;
  }

  return `<div class="workspace">
    <div class="pdf-pane">
      ${state.totalPages > 1 ? `<div class="page-nav">
        <button class="btn btn-ghost btn-xs" onclick="changePage(-1)" ${state.currentPage <= 1 ? 'disabled' : ''}>◄</button>
        <span>Page ${state.currentPage} / ${state.totalPages}</span>
        <button class="btn btn-ghost btn-xs" onclick="changePage(1)" ${state.currentPage >= state.totalPages ? 'disabled' : ''}>►</button>
      </div>` : ""}
      ${hasPdf ? `
        <div style="display:flex;justify-content:center;padding:20px">
          <div id="pdf-container" class="pdf-container">
            <canvas id="pdf-canvas"></canvas>
            <svg id="overlay-svg" class="overlay-svg"></svg>
          </div>
        </div>` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-family:var(--font-mono)">No PDF attached to this document</div>`}
    </div>
    <div class="annotation-pane">
      <div class="ann-panel-header">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div class="ann-panel-title">${doc.id}</div>
            <div class="ann-panel-sub">${badge(doc.document_category, "blue")} ${badge(doc.annotation_status, statusColor(doc.annotation_status))} ${badge(doc.source_type ?? "—", "gray")}</div>
          </div>
          <button class="btn btn-ghost btn-xs" onclick="setState({view:'queue',selectedDoc:null});loadQueue()">✕ Close</button>
        </div>
      </div>
      ${panelContent}
    </div>
  </div>`;
}

// ─── Main Render ─────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (!state.apiKey) { app.innerHTML = renderAuth(); document.getElementById("auth-seed-key")?.focus(); return; }
  if (!state.auditKey) { app.innerHTML = renderAuditAuth(); document.getElementById("auth-audit-only")?.focus(); return; }
  if (state.view === "workspace" && state.selectedDoc) {
    app.innerHTML = `${renderHeader()}${renderWorkspace()}`;
    setTimeout(() => { initDrawListeners(); if (state.pdfDoc) renderPage(state.currentPage); }, 50);
    return;
  }
  // AP-10c — audit document view uses its own split-pane layout (full height, no content wrapper)
  if (state.view === "audit" && state.auditView === "document") {
    app.innerHTML = `${renderHeader()}${renderAuditDocument()}`;
    if (state.auditPdfDoc && state.auditPageIndex != null) {
      setTimeout(() => renderAuditPdfPage(state.auditPageIndex), 50);
    }
    bindAuditPdfGestures();
    return;
  }
  let body;
  if (state.view === "audit") body = renderAudit();
  else if (state.view === "queue") body = renderQueue();
  else body = renderDashboard();
  app.innerHTML = `${renderHeader()}<div class="content">${body}</div>`;
}

// ─── Config Injection ────────────────────────────────────
if (window.ADI_CONFIG?.seedKey) {
  state.apiKey = window.ADI_CONFIG.seedKey;
  localStorage.setItem("seed_api_key", state.apiKey);
}
if (window.ADI_CONFIG?.auditKey) {
  state.auditKey = window.ADI_CONFIG.auditKey;
  sessionStorage.setItem("audit_admin_key", state.auditKey);
}

// ─── Init ────────────────────────────────────────────────
if (state.apiKey) { render(); loadDashboard(); } else { render(); }
</script>
