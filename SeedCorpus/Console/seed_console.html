<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEED Console — Record Health</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface-hover: #1a2236;
    --border: #1e293b;
    --border-active: #3b82f6;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #475569;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #10b981;
    --green-bg: #10b98118;
    --amber: #f59e0b;
    --amber-bg: #f59e0b18;
    --red: #ef4444;
    --red-bg: #ef444418;
    --purple: #8b5cf6;
    --purple-bg: #8b5cf618;
    --font-mono: 'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace;
    --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }

  /* Auth */
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .auth-box { width: 400px; padding: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  .auth-label { font-size: 11px; font-family: var(--font-mono); color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }
  .auth-title { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .auth-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
  .field-label { display: block; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .auth-input { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 13px; outline: none; }
  .auth-input:focus { border-color: var(--accent); }
  .auth-input.error { border-color: var(--red); }
  .error-msg { font-size: 12px; color: var(--red); margin-top: 6px; }

  /* Buttons */
  .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-family: var(--font-mono); font-weight: 500; cursor: pointer; border: 1px solid; transition: all 0.15s ease; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-ghost { background: transparent; border-color: var(--border); color: var(--text); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface-hover); }
  .btn-full { width: 100%; padding: 10px 16px; margin-top: 12px; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-xs { padding: 5px 12px; font-size: 11px; }

  /* Badge */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); font-weight: 500; letter-spacing: 0.02em; }
  .badge-blue { background: #3b82f618; color: #60a5fa; border: 1px solid #3b82f640; }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid #10b98140; }
  .badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid #f59e0b40; }
  .badge-red { background: var(--red-bg); color: var(--red); border: 1px solid #ef444440; }
  .badge-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid #8b5cf640; }
  .badge-gray { background: #64748b18; color: #94a3b8; border: 1px solid #64748b40; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 56px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .header-left { display: flex; align-items: center; gap: 24px; }
  .header-brand { display: flex; align-items: baseline; gap: 8px; }
  .header-brand-name { font-size: 15px; font-weight: 700; font-family: var(--font-mono); }
  .header-brand-sub { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
  .header-divider { width: 1px; height: 20px; background: var(--border); }
  .nav-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); font-size: 13px; font-family: var(--font-sans); font-weight: 500; cursor: pointer; transition: all 0.1s ease; }
  .nav-btn.active { background: var(--bg); color: var(--text); }
  .nav-btn:hover:not(.active) { color: var(--text); }

  /* Layout */
  .content { max-width: 1100px; margin: 0 auto; padding: 32px; }

  /* Stat cards */
  .stat-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; flex: 1; min-width: 160px; }
  .stat-label { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-family: var(--font-mono); font-weight: 600; line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }

  /* Section header */
  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .section-sub { font-size: 13px; color: var(--text-muted); }
  .section-header { margin-bottom: 24px; }

  /* Queue */
  .queue-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
  .filter-row { display: flex; gap: 8px; }
  .queue-col-header { display: grid; grid-template-columns: 1fr 120px 140px 120px 100px 140px; gap: 12px; padding: 8px 16px; font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .queue-row { display: grid; grid-template-columns: 1fr 120px 140px 120px 100px 140px; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.1s ease; font-size: 13px; font-family: var(--font-mono); align-items: center; margin-bottom: 2px; }
  .queue-row:hover { background: var(--surface-hover); border-color: var(--border-active); }
  .queue-id { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .queue-layout { color: var(--text-muted); font-size: 12px; }
  .queue-date { color: var(--text-dim); font-size: 11px; }
  .queue-empty { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 48px; text-align: center; }
  .queue-empty-title { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; }
  .queue-empty-sub { font-size: 12px; color: var(--text-muted); }

  /* Detail */
  .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .detail-meta { flex: 1; }
  .detail-id { font-size: 14px; font-family: var(--font-mono); font-weight: 600; }
  .detail-badges { display: flex; gap: 8px; margin-top: 4px; }
  .tab-bar { display: flex; gap: 2px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab-btn { padding: 8px 16px; font-size: 12px; font-family: var(--font-mono); font-weight: 500; background: transparent; border: none; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s ease; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-content { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; max-height: 600px; overflow: auto; }
  .field-row { display: grid; grid-template-columns: 140px 100px 80px 80px 60px; gap: 12px; padding: 10px 12px; background: var(--bg); border-radius: 6px; font-size: 12px; font-family: var(--font-mono); align-items: center; margin-bottom: 8px; }
  .field-label-cell { font-weight: 500; }
  .field-value { color: var(--green); }
  .field-unit { color: var(--text-muted); }
  .field-range { color: var(--text-dim); }
  .ann-row { padding: 12px 16px; background: var(--bg); border-radius: 6px; margin-bottom: 12px; }
  .ann-badges { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .ann-rationale { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .meta-pre { font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
  .empty-state { color: var(--text-dim); font-size: 13px; }
  .info-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; color: var(--text-dim); font-size: 13px; }
  .loading { color: var(--text-muted); padding: 40px; }
  .error-state { color: var(--red); padding: 40px; }

  /* Annotation Form */
  .ann-form-row { padding: 16px; background: var(--bg); border-radius: 8px; margin-bottom: 12px; border: 1px solid var(--border); }
  .ann-form-row.flagged { border-color: var(--red); }
  .ann-form-field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .ann-form-field-name { font-family: var(--font-mono); font-size: 13px; font-weight: 500; }
  .ann-form-field-value { font-family: var(--font-mono); font-size: 12px; color: var(--green); }
  .ann-form-verdict { display: flex; gap: 6px; margin-bottom: 10px; }
  .verdict-btn { padding: 4px 12px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); transition: all 0.1s; }
  .verdict-btn:hover { border-color: var(--text-muted); }
  .verdict-btn.correct { background: var(--green-bg); color: var(--green); border-color: #10b98140; }
  .verdict-btn.incorrect { background: var(--red-bg); color: var(--red); border-color: #ef444440; }
  .verdict-btn.missing { background: var(--amber-bg); color: var(--amber); border-color: #f59e0b40; }
  .ann-form-select { padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 11px; outline: none; width: 100%; margin-bottom: 8px; }
  .ann-form-select:focus { border-color: var(--accent); }
  .ann-form-textarea { width: 100%; padding: 8px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 12px; outline: none; resize: vertical; min-height: 48px; }
  .ann-form-textarea:focus { border-color: var(--accent); }
  .ann-form-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .ann-form-section-title { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .ann-form-add-btn { padding: 6px 14px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); cursor: pointer; border: 1px dashed var(--border); background: transparent; color: var(--text-muted); transition: all 0.1s; width: 100%; margin-top: 8px; }
  .ann-form-add-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ann-form-remove { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-dim); }
  .ann-form-remove:hover { border-color: var(--red); color: var(--red); }
  .ann-submit-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .ann-submit-summary { font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); }
  .success-msg { font-size: 12px; color: var(--green); margin-top: 8px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const API_BASE = "https://recordhealth-api.jason-nolte.workers.dev";

// ─── State ───────────────────────────────────────────────
const CONFUSION_CLASSES = [
  { group: "Domain 1 — Optical", classes: [
    "d1_alphanumericSubstitution", "d1_ligatureCollapse", "d1_punctuationDropout",
    "d1_diacriticStrip", "d1_lowContrastDropout", "d1_skewDistortion",
    "d1_motionBlur", "d1_shadowIntrusion", "d1_compressionArtifact",
    "d1_faxHalftone", "d1_generationLoss", "d1_stampOverlay",
    "d1_paperDamage", "d1_backgroundTexture"
  ]},
  { group: "Domain 2 — Layout", classes: [
    "d2_columnMisattribution", "d2_referenceRangeCollision", "d2_labelValueInversion",
    "d2_headerValueCollision", "d2_multiPageContextLoss", "d2_sectionBoundaryFailure",
    "d2_nestedTableFailure", "d2_reflowArtifact", "d2_impliedUnitContext",
    "d2_lineBreakIntrusion", "d2_whitespaceDelimiterAmbiguity"
  ]},
  { group: "Domain 2 — Terminology", classes: [
    "d2_terminologyVariant", "d2_brandToGenericFailure", "d2_formularyCodeUnresolved",
    "d2_compoundTermFailure", "d2_unitVariant", "d2_numericFormatVariant",
    "d2_dateFormatVariant", "d2_negationMisparse", "d2_qualifierDropout",
    "d2_contextualAbbreviationCollision", "d2_providerSpecificNomenclature"
  ]},
  { group: "Other", classes: ["unknown"] }
];

let state = {
  apiKey: localStorage.getItem("seed_api_key") || null,
  view: "dashboard",
  selectedDoc: null,
  loading: false,
  error: null,
  stats: null,
  queue: null,
  docDetail: null,
  filter: "all",
  // Annotation form state
  annForm: null, // { verdicts: {idx: 'correct'|'incorrect'|'missing'}, classes: {idx: str}, rationales: {idx: str}, negSpace: [{fieldType, canonicalId, rationale}] }
  annSubmitting: false,
  annSuccess: null,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ─── API ─────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    method: opts.method || (opts.body ? "POST" : "GET"),
    headers: {
      "Authorization": `Bearer ${state.apiKey}`,
      "Content-Type": "application/json",
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ─── Actions ─────────────────────────────────────────────
async function doAuth(key) {
  try {
    state.apiKey = key;
    await api("/v1/seed/queue?limit=1");
    localStorage.setItem("seed_api_key", key);
    setState({ error: null });
    loadDashboard();
  } catch (e) {
    state.apiKey = null;
    localStorage.removeItem("seed_api_key");
    setState({ error: e.message || "Connection failed" });
  }
}

function disconnect() {
  localStorage.removeItem("seed_api_key");
  setState({ apiKey: null, view: "dashboard", selectedDoc: null, stats: null, queue: null, docDetail: null });
}

async function loadDashboard() {
  setState({ loading: true });
  try {
    const stats = await api("/v1/seed/stats");
    setState({ stats, loading: false });
  } catch (e) {
    setState({ loading: false, error: e.message });
  }
}

async function loadQueue() {
  setState({ loading: true });
  try {
    const params = state.filter !== "all" ? `?status=${state.filter}` : "";
    const queue = await api(`/v1/seed/queue${params}`);
    setState({ queue, loading: false });
  } catch (e) {
    setState({ loading: false, error: e.message });
  }
}

async function loadDocDetail(id) {
  setState({ selectedDoc: id, loading: true, docDetail: null, annForm: null, annSuccess: null });
  try {
    const docDetail = await api(`/v1/seed/document/${id}`);
    setState({ docDetail, loading: false });
  } catch (e) {
    setState({ loading: false, error: e.message });
  }
}

function initAnnotationForm() {
  const gt = state.docDetail?.document?.ground_truth || [];
  setState({
    annForm: {
      verdicts: {},
      classes: {},
      rationales: {},
      negSpace: [],
    },
    annSuccess: null,
    activeTab: "annotate",
  });
}

function setVerdict(idx, verdict) {
  const form = state.annForm;
  if (form.verdicts[idx] === verdict) {
    delete form.verdicts[idx];
    delete form.classes[idx];
  } else {
    form.verdicts[idx] = verdict;
    if (verdict === "correct") delete form.classes[idx];
  }
  setState({ annForm: form });
}

function setAnnClass(idx, cls) {
  state.annForm.classes[idx] = cls;
  setState({ annForm: state.annForm });
}

function setAnnRationale(idx, text) {
  state.annForm.rationales[idx] = text;
  setState({ annForm: state.annForm });
}

function addNegSpace() {
  state.annForm.negSpace.push({ fieldType: "", canonicalId: "", rationale: "", visuallyPresent: true });
  setState({ annForm: state.annForm });
}

function removeNegSpace(i) {
  state.annForm.negSpace.splice(i, 1);
  setState({ annForm: state.annForm });
}

function updateNegSpace(i, field, value) {
  state.annForm.negSpace[i][field] = value;
  setState({ annForm: state.annForm });
}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

async function submitAnnotation() {
  const form = state.annForm;
  const doc = state.docDetail.document;
  const gt = Array.isArray(doc.ground_truth) ? doc.ground_truth : [];

  setState({ annSubmitting: true, annSuccess: null });

  const annotations = [];
  for (const [idx, verdict] of Object.entries(form.verdicts)) {
    const i = parseInt(idx);
    const field = gt[i];
    if (!field) continue;
    annotations.push({
      id: generateUUID(),
      correctionClass: verdict === "incorrect" ? (form.classes[idx] || "unknown") : null,
      extractionOutput: { fieldType: field.fieldType, label: field.label, value: field.value, unit: field.unit },
      correctionDetail: { verdict, originalField: field },
      clinicalRationale: form.rationales[idx] || "",
      negativeSpaceFlags: [],
      requiresEscalation: false,
      escalatedToLevel: null,
      qualityFlags: verdict === "correct" ? ["verified_correct"] : [],
    });
  }

  const negativeSpace = form.negSpace
    .filter(ns => ns.fieldType)
    .map(ns => ({
      id: generateUUID(),
      missingFieldType: ns.fieldType,
      missingCanonicalId: ns.canonicalId || null,
      expectedRegion: null,
      visuallyPresent: ns.visuallyPresent,
      clinicalSignificance: "medium",
      clinicalRationale: ns.rationale || "",
    }));

  try {
    await api("/v1/seed/annotate", {
      method: "POST",
      body: {
        seedDocumentId: doc.id,
        annotatorId: "seed-console-l0",
        annotatorLevel: "L0",
        annotations,
        negativeSpace,
      }
    });
    // Reload the document to see updated status
    const docDetail = await api(`/v1/seed/document/${doc.id}`);
    setState({ annSubmitting: false, annSuccess: true, docDetail, annForm: null, activeTab: "annotations" });
  } catch (e) {
    setState({ annSubmitting: false, error: e.message });
  }
}

// ─── Render Helpers ──────────────────────────────────────
function badge(text, color) {
  return `<span class="badge badge-${color}">${text}</span>`;
}

function statusColor(s) {
  return { pending: "amber", extracted: "purple", annotated: "green" }[s] || "gray";
}

function statCard(label, value, color, sub) {
  return `<div class="stat-card">
    <div class="stat-label">${label}</div>
    <div class="stat-value" style="color:${color || 'var(--accent)'}">${value}</div>
    ${sub ? `<div class="stat-sub">${sub}</div>` : ""}
  </div>`;
}

// ─── Views ───────────────────────────────────────────────
function renderAuth() {
  return `<div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-label">Record Health</div>
      <div class="auth-title">SEED Console</div>
      <div class="auth-sub">Annotation & Corpus Management</div>
      <label class="field-label">API Key</label>
      <input type="password" id="auth-key" class="auth-input ${state.error ? 'error' : ''}"
        placeholder="Enter ADMIN_KEY or ANNOTATOR_KEY"
        onkeydown="if(event.key==='Enter')document.getElementById('auth-btn').click()">
      ${state.error ? `<div class="error-msg">${state.error}</div>` : ""}
      <button id="auth-btn" class="btn btn-primary btn-full"
        onclick="doAuth(document.getElementById('auth-key').value)">Connect</button>
    </div>
  </div>`;
}

function renderHeader() {
  const navBtn = (id, icon, label) => `<button class="nav-btn ${state.view === id && !state.selectedDoc ? 'active' : ''}"
    onclick="setState({view:'${id}',selectedDoc:null});${id === 'dashboard' ? 'loadDashboard()' : 'loadQueue()'}">${icon} ${label}</button>`;
  return `<div class="header">
    <div class="header-left">
      <div class="header-brand">
        <span class="header-brand-name">SEED</span>
        <span class="header-brand-sub">Console</span>
      </div>
      <div class="header-divider"></div>
      <div style="display:flex;gap:4px">
        ${navBtn("dashboard", "◆", "Dashboard")}
        ${navBtn("queue", "≡", "Queue")}
      </div>
    </div>
    <button class="btn btn-ghost btn-xs" onclick="disconnect()">Disconnect</button>
  </div>`;
}

function renderDashboard() {
  if (state.loading) return `<div class="loading">Loading stats...</div>`;
  const s = state.stats?.corpus || {};
  const byStatus = s.byStatus || {};
  const bySplit = s.bySplit || {};
  return `
    <div class="section-header">
      <div class="section-title">Dashboard</div>
      <div class="section-sub">Corpus overview and pipeline health</div>
    </div>
    <div class="stat-row">
      ${statCard("Total Documents", s.total || 0, "var(--accent)")}
      ${statCard("Pending", byStatus.pending || 0, "var(--amber)")}
      ${statCard("Extracted", byStatus.extracted || 0, "var(--purple)")}
      ${statCard("Annotated", byStatus.annotated || 0, "var(--green)")}
    </div>
    <div class="stat-row">
      ${statCard("Training Split", bySplit.training || 0, "var(--text)", `${bySplit.validation || 0} validation · ${bySplit.test || 0} test`)}
      ${statCard("Annotations", state.stats?.annotations?.total || 0)}
      ${statCard("Extraction Runs", state.stats?.extractionRuns?.total || 0)}
      ${statCard("Augmented", s.augmented || 0, "var(--text)", `${s.original || 0} original`)}
    </div>
    ${state.stats?.latestBenchmark ? `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px">
        <div class="stat-label" style="margin-bottom:12px">Latest Benchmark</div>
        <div style="display:flex;gap:24px;flex-wrap:wrap">
          <div><span style="color:var(--text-dim);font-size:12px">Accuracy: </span>
            <span style="color:var(--green);font-family:var(--font-mono);font-weight:600">${(state.stats.latestBenchmark.overall_accuracy * 100).toFixed(1)}%</span></div>
          <div><span style="color:var(--text-dim);font-size:12px">Gate: </span>
            ${badge(state.stats.latestBenchmark.gate_result || "N/A", state.stats.latestBenchmark.gate_result === "approved" ? "green" : "amber")}</div>
          <div><span style="color:var(--text-dim);font-size:12px">Library: </span>
            <span style="font-family:var(--font-mono)">${state.stats.latestBenchmark.pattern_library_version}</span></div>
        </div>
      </div>
    ` : `<div class="info-box">No benchmark runs yet</div>`}`;
}

function renderQueue() {
  if (state.loading) return `<div class="loading">Loading queue...</div>`;
  const d = state.queue;
  const filterBtn = (f, label) => `<button class="btn ${state.filter === f ? 'btn-primary' : 'btn-ghost'} btn-sm"
    onclick="setState({filter:'${f}'});loadQueue()">${label}${f !== 'all' && d?.stats?.[f] != null ? ` (${d.stats[f]})` : ''}</button>`;

  return `
    <div class="queue-header">
      <div>
        <div class="section-title">Annotation Queue</div>
        <div class="section-sub">${d?.stats?.total || 0} documents in corpus</div>
      </div>
      <div class="filter-row">
        ${filterBtn("all", "All")}
        ${filterBtn("pending", "Pending")}
        ${filterBtn("extracted", "Extracted")}
        ${filterBtn("annotated", "Annotated")}
      </div>
    </div>
    ${!d?.documents?.length ? `
      <div class="queue-empty">
        <div class="queue-empty-title">No documents found</div>
        <div class="queue-empty-sub">Ingest documents via POST /v1/seed/ingest-document</div>
      </div>
    ` : `
      <div class="queue-col-header">
        <span>ID</span><span>Category</span><span>Layout</span>
        <span>Split</span><span>Status</span><span>Created</span>
      </div>
      ${d.documents.map(doc => `
        <div class="queue-row" onclick="loadDocDetail('${doc.id}')">
          <span class="queue-id">${doc.id}</span>
          <span>${badge(doc.document_category, "blue")}</span>
          <span class="queue-layout">${doc.layout_type}</span>
          <span>${badge(doc.corpus_split, "gray")}</span>
          <span>${badge(doc.annotation_status, statusColor(doc.annotation_status))}</span>
          <span class="queue-date">${new Date(doc.created_at).toLocaleDateString()}</span>
        </div>
      `).join("")}
    `}`;
}

function renderDocDetail() {
  if (state.loading) return `<div class="loading">Loading document...</div>`;
  if (!state.docDetail) return `<div class="error-state">Document not found</div>`;

  const doc = state.docDetail.document;
  const extraction = state.docDetail.latestExtraction;
  const gt = Array.isArray(doc.ground_truth) ? doc.ground_truth : [];
  const exFields = extraction?.extractions || [];
  const anns = state.docDetail.annotations || [];
  const ns = state.docDetail.negativeSpace || [];

  // Default tab
  if (!state.activeTab) state.activeTab = "ground_truth";

  const tabs = [
    { id: "ground_truth", label: "Ground Truth", count: gt.length },
    { id: "extractions", label: "Extractions", count: exFields.length },
    { id: "annotate", label: "✎ Annotate" },
    { id: "annotations", label: "Annotations", count: anns.length },
    { id: "negative_space", label: "Negative Space", count: ns.length },
    { id: "metadata", label: "Metadata" },
  ];

  const tabBtn = (t) => `<button class="tab-btn ${state.activeTab === t.id ? 'active' : ''}"
    onclick="${t.id === 'annotate' ? 'initAnnotationForm()' : `setState({activeTab:'${t.id}'})`}">${t.label}${t.count != null ? ` (${t.count})` : ''}</button>`;

  let content = "";
  if (state.activeTab === "ground_truth") {
    content = gt.length ? gt.map(f => `
      <div class="field-row">
        <span class="field-label-cell">${f.label || "—"}</span>
        <span class="field-value">${f.value || "—"}</span>
        <span class="field-unit">${f.unit || "—"}</span>
        <span class="field-range">${f.referenceRange || "—"}</span>
        <span>${f.flag ? badge(f.flag, f.flag === "H" ? "red" : f.flag === "L" ? "amber" : "gray") : "—"}</span>
      </div>
    `).join("") : `<div class="empty-state">No ground truth fields</div>`;
  } else if (state.activeTab === "extractions") {
    content = exFields.length ? exFields.map(f => `
      <div class="field-row">
        <span class="field-label-cell">${f.label || f.fieldType || "—"}</span>
        <span class="field-value">${f.value || "—"}</span>
        <span class="field-unit">${f.unit || "—"}</span>
        <span class="field-range">${f.confidence != null ? (f.confidence * 100).toFixed(0) + "%" : "—"}</span>
        <span>${f.confusionClassPredicted ? badge(f.confusionClassPredicted, "amber") : "—"}</span>
      </div>
    `).join("") : `<div class="empty-state">${extraction ? "Extraction ran but produced no fields" : "No extraction runs yet"}</div>`;
  } else if (state.activeTab === "annotations") {
    content = anns.length ? anns.map(a => `
      <div class="ann-row">
        <div class="ann-badges">
          ${badge(a.correction_class || "unclassified", "purple")}
          ${badge(a.annotator_level, "gray")}
          ${a.requires_escalation ? badge("escalation", "red") : ""}
        </div>
        ${a.clinical_rationale ? `<div class="ann-rationale">${a.clinical_rationale}</div>` : ""}
      </div>
    `).join("") : `<div class="empty-state">No annotations yet</div>`;
  } else if (state.activeTab === "negative_space") {
    content = ns.length ? ns.map(n => `
      <div class="ann-row">
        <div class="ann-badges">
          ${badge(n.missing_field_type, "red")}
          ${n.missing_canonical_id ? badge(n.missing_canonical_id, "blue") : ""}
          ${badge(n.visually_present ? "visible but missed" : "not visible", n.visually_present ? "amber" : "gray")}
        </div>
        ${n.clinical_rationale ? `<div class="ann-rationale">${n.clinical_rationale}</div>` : ""}
      </div>
    `).join("") : `<div class="empty-state">No negative space flags</div>`;
  } else if (state.activeTab === "metadata") {
    content = `<pre class="meta-pre">${JSON.stringify({
      id: doc.id, sourceFile: doc.source_file, layoutType: doc.layout_type,
      layoutVariant: doc.layout_variant, providerLayoutHash: doc.provider_layout_hash,
      documentCategory: doc.document_category, corpusSplit: doc.corpus_split,
      annotationStatus: doc.annotation_status, annotatedAt: doc.annotated_at,
      annotatorLevel: doc.annotator_level, isAugmented: doc.is_augmented,
      augmentationClass: doc.augmentation_class, augmentationGeneration: doc.augmentation_generation,
      degradations: doc.degradations, createdAt: doc.created_at,
    }, null, 2)}</pre>`;
  } else if (state.activeTab === "annotate") {
    const form = state.annForm;
    if (!form) {
      content = `<div class="empty-state">Initializing form...</div>`;
    } else {
      const fieldRows = gt.map((field, i) => {
        const v = form.verdicts[i];
        return `<div class="ann-form-row ${v === 'incorrect' ? 'flagged' : ''}">
          <div class="ann-form-field-header">
            <span class="ann-form-field-name">${field.label || field.fieldType || 'Field ' + i}</span>
            <span class="ann-form-field-value">${field.value || '—'}${field.unit ? ' ' + field.unit : ''}</span>
          </div>
          <div class="ann-form-verdict">
            <button class="verdict-btn ${v === 'correct' ? 'correct' : ''}" onclick="setVerdict(${i},'correct')">✓ Correct</button>
            <button class="verdict-btn ${v === 'incorrect' ? 'incorrect' : ''}" onclick="setVerdict(${i},'incorrect')">✗ Incorrect</button>
          </div>
          ${v === 'incorrect' ? `
            <select class="ann-form-select" onchange="setAnnClass(${i},this.value)">
              <option value="" ${!form.classes[i] ? 'selected' : ''}>Select confusion class...</option>
              ${CONFUSION_CLASSES.map(g =>
                `<optgroup label="${g.group}">${g.classes.map(c => 
                  `<option value="${c}" ${form.classes[i] === c ? 'selected' : ''}>${c}</option>`
                ).join("")}</optgroup>`
              ).join("")}
            </select>
          ` : ''}
          <textarea class="ann-form-textarea" placeholder="Rationale (optional)" 
            oninput="setAnnRationale(${i},this.value)">${form.rationales[i] || ''}</textarea>
        </div>`;
      }).join("");

      const negSpaceRows = form.negSpace.map((ns, i) => `
        <div class="ann-form-row">
          <div class="ann-form-field-header">
            <span class="ann-form-field-name">Missing Field #${i + 1}</span>
            <button class="ann-form-remove" onclick="removeNegSpace(${i})">Remove</button>
          </div>
          <input class="ann-form-select" placeholder="Field type (e.g. numericLabValue)" 
            value="${ns.fieldType}" oninput="updateNegSpace(${i},'fieldType',this.value)" style="margin-bottom:6px">
          <input class="ann-form-select" placeholder="Canonical ID (e.g. LOINC:2345-7)" 
            value="${ns.canonicalId}" oninput="updateNegSpace(${i},'canonicalId',this.value)" style="margin-bottom:6px">
          <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
            <label style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted);display:flex;align-items:center;gap:4px;cursor:pointer">
              <input type="checkbox" ${ns.visuallyPresent ? 'checked' : ''} 
                onchange="updateNegSpace(${i},'visuallyPresent',this.checked)"> Visually present in document
            </label>
          </div>
          <textarea class="ann-form-textarea" placeholder="Why is this field expected?" 
            oninput="updateNegSpace(${i},'rationale',this.value)">${ns.rationale}</textarea>
        </div>
      `).join("");

      const verdictCount = Object.keys(form.verdicts).length;
      const incorrectCount = Object.values(form.verdicts).filter(v => v === 'incorrect').length;
      const nsCount = form.negSpace.filter(ns => ns.fieldType).length;

      content = `
        <div class="ann-form-section-title">Ground Truth Fields — Score Each</div>
        ${gt.length ? fieldRows : '<div class="empty-state">No ground truth fields to annotate</div>'}
        
        <div class="ann-form-section">
          <div class="ann-form-section-title">Negative Space — Missing Extractions</div>
          <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">
            Flag fields that should have been extracted but weren't
          </div>
          ${negSpaceRows}
          <button class="ann-form-add-btn" onclick="addNegSpace()">+ Add Missing Field</button>
        </div>

        <div class="ann-submit-bar">
          <div class="ann-submit-summary">
            ${verdictCount} scored · ${incorrectCount} flagged · ${nsCount} missing
          </div>
          <button class="btn btn-primary" ${state.annSubmitting ? 'disabled' : ''} 
            onclick="submitAnnotation()">
            ${state.annSubmitting ? 'Submitting...' : 'Submit Annotations'}
          </button>
        </div>
        ${state.annSuccess ? '<div class="success-msg">Annotations saved successfully</div>' : ''}
      `;
    }
  }

  return `
    <div class="detail-header">
      <button class="btn btn-ghost btn-sm" onclick="setState({selectedDoc:null,activeTab:null,annForm:null,annSuccess:null})">← Back</button>
      <div class="detail-meta">
        <div class="detail-id">${doc.id}</div>
        <div class="detail-badges">
          ${badge(doc.document_category, "blue")}
          ${badge(doc.annotation_status, statusColor(doc.annotation_status))}
          ${badge(doc.corpus_split, "gray")}
          ${doc.is_augmented ? badge("augmented", "purple") : ""}
        </div>
      </div>
    </div>
    <div class="tab-bar">${tabs.map(tabBtn).join("")}</div>
    <div class="tab-content">${content}</div>`;
}

// ─── Main Render ─────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (!state.apiKey) {
    app.innerHTML = renderAuth();
    const input = document.getElementById("auth-key");
    if (input) input.focus();
    return;
  }
  let body;
  if (state.selectedDoc) {
    body = renderDocDetail();
  } else if (state.view === "queue") {
    body = renderQueue();
  } else {
    body = renderDashboard();
  }
  app.innerHTML = `${renderHeader()}<div class="content">${body}</div>`;
}

// ─── Init ────────────────────────────────────────────────
if (state.apiKey) {
  render();
  loadDashboard();
} else {
  render();
}
</script>
</body>
</html>
